<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sandriel Prime - Gestão</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body data-page="admin">
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="logo">Sandriel Prime</div>
      <h2>Acesso Administrativo</h2>
      <form id="login-form" class="form">
        <div class="form-group">
          <label for="login-email">E-mail</label>
          <input type="email" id="login-email" required>
        </div>
        <div class="form-group">
          <label for="login-password">Senha</label>
          <input type="password" id="login-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Entrar</button>
      </form>
      <div id="login-message" class="message"></div>
    </div>
  </div>

  <div id="admin-dashboard" class="admin-dashboard hidden">
    <aside class="sidebar">
      <div class="logo">Sandriel Prime</div>
      <nav class="nav-tabs">
        <button class="nav-tab active" data-tab="agenda" type="button">Agenda</button>
        <button class="nav-tab" data-tab="barbers" type="button">Profissionais</button>
        <button class="nav-tab" data-tab="services" type="button">Serviços</button>
        <button class="nav-tab" data-tab="schedule" type="button">Horários</button>
        <button class="nav-tab" data-tab="financial" type="button">Financeiro</button>
      </nav>
      <button id="logout-btn" class="btn btn-outline btn-small" type="button">Sair</button>
    </aside>

    <main class="admin-main">
      <section id="tab-agenda" class="tab-panel active">
        <h2>Agenda</h2>
        <div class="filters">
          <input type="date" id="agenda-date">
          <select id="agenda-barber"><option value="">Todos os profissionais</option></select>
        </div>
        <div id="agenda-list" class="list-container"></div>
      </section>

      <section id="tab-barbers" class="tab-panel">
        <h2>Profissionais</h2>
        <form id="barber-form" class="form-row">
          <input type="hidden" id="barber-id">
          <div class="form-group"><label>Nome</label><input type="text" id="barber-name" required></div>
          <div class="form-group"><label>Foto URL</label><input type="url" id="barber-photo" placeholder="https://..."></div>
          <div class="form-group"><label>Início</label><input type="time" id="barber-start"></div>
          <div class="form-group"><label>Fim</label><input type="time" id="barber-end"></div>
          <div class="form-group checkbox-group"><label><input type="checkbox" id="barber-active" checked> Ativo</label></div>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </form>
        <div id="barbers-list" class="list-container"></div>
      </section>

      <section id="tab-services" class="tab-panel">
        <h2>Serviços</h2>
        <form id="service-form" class="form-row">
          <input type="hidden" id="service-id">
          <div class="form-group"><label>Nome</label><input type="text" id="service-name" required></div>
          <div class="form-group"><label>Preço (R$)</label><input type="number" id="service-price" step="0.01" required></div>
          <div class="form-group"><label>Duração (min)</label><input type="number" id="service-duration" required></div>
          <div class="form-group checkbox-group"><label><input type="checkbox" id="service-active" checked> Ativo</label></div>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </form>
        <div id="services-list" class="list-container"></div>
      </section>

      <section id="tab-schedule" class="tab-panel">
        <h2>Configuração de Horários</h2>
        <form id="schedule-form" class="form">
          <div class="form-row">
            <div class="form-group">
              <label>Dias de funcionamento</label>
              <div class="weekdays-check">
                <label><input type="checkbox" id="wd-0"> Dom</label>
                <label><input type="checkbox" id="wd-1" checked> Seg</label>
                <label><input type="checkbox" id="wd-2" checked> Ter</label>
                <label><input type="checkbox" id="wd-3" checked> Qua</label>
                <label><input type="checkbox" id="wd-4" checked> Qui</label>
                <label><input type="checkbox" id="wd-5" checked> Sex</label>
                <label><input type="checkbox" id="wd-6"> Sáb</label>
              </div>
            </div>
            <div class="form-group"><label>Abertura</label><input type="time" id="schedule-open" value="09:00" required></div>
            <div class="form-group"><label>Fechamento</label><input type="time" id="schedule-close" value="19:00" required></div>
            <div class="form-group"><label>Intervalo (min)</label><input type="number" id="schedule-interval" value="30" min="5" required></div>
          </div>
          <button type="submit" class="btn btn-primary">Salvar Configuração</button>
        </form>
        <div id="schedule-status" class="message"></div>
      </section>

      <section id="tab-financial" class="tab-panel">
        <h2>Financeiro</h2>
        <div class="kpi-grid">
          <div class="kpi-card"><h3>Hoje</h3><p id="kpi-today">R$ 0,00</p></div>
          <div class="kpi-card"><h3>Esta Semana</h3><p id="kpi-week">R$ 0,00</p></div>
          <div class="kpi-card"><h3>Este Mês</h3><p id="kpi-month">R$ 0,00</p></div>
          <div class="kpi-card"><h3>Despesas</h3><p id="kpi-expenses">R$ 0,00</p></div>
          <div class="kpi-card"><h3>Resultado Líquido</h3><p id="kpi-net">R$ 0,00</p></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Despesa - Descrição</label><input type="text" id="expense-desc" placeholder="Ex: Aluguel"></div>
          <div class="form-group"><label>Valor (R$)</label><input type="number" id="expense-amount" step="0.01"></div>
          <div class="form-group"><label>Data</label><input type="date" id="expense-date"></div>
          <button id="add-expense-btn" class="btn btn-primary" type="button">Adicionar Despesa</button>
        </div>
        <h3>Transações</h3>
        <div id="financial-list" class="list-container"></div>
      </section>
    </main>
  </div>

  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
    }
  }
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
